<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <script src="library.js" defer></script>
    <link rel="stylesheet" href="library.css">
</head>
<body>
<button command="show-modal" commandfor="book-dialog">New Book</button>
<div class="book-shelf"></div> 
<dialog id="book-dialog">
    <form class="form">
        <div class="form-row">
          <label for="Book-title">Book title</label>
          <input type="text" id="book-title" name="Book-title" required>
        </div>
        <div class="form-row">
          <label for="Author">Author</label>
          <input type="text" id="author" name="Author" required>
        </div>
        <div class="form-row">
          <label for="pages">Number of pages</label>
          <input type="number" id="pages" name="pages" required>
        </div>
        <div class="form-row">
         <label for="read">Have you read book</label>
         <input type="radio" name="read" id="read-yes" value="yes"> Yes
        <input type="radio" name="read" id="read-no" value="no"> No
        </div>
        <div class="form-row">
            <input type="submit" id="submit" value="submit">
        </div>    
    </form>
</dialog>

</body>
</html>
